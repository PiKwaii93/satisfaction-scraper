services:
  postgres_db:
    image: postgres:15-alpine
    container_name: satisfaction_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: satisfaction_client
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql

  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: satisfaction_mlflow
    ports:
      - "5000:5000"
    environment:
      - BACKEND_STORE_URI=sqlite:////mlflow/mlflow.db
      - ARTIFACT_ROOT=/mlflow/artifacts
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --allowed-hosts "*" --cors-allowed-origins "*"
    volumes:
      - mlflow_data:/mlflow
      - mlflow_artifacts:/mlflow/artifacts

  redis:
    image: redis:7-alpine
    container_name: satisfaction_redis
    ports:
      - "6379:6379"

  worker:
    build: .
    container_name: satisfaction_worker
    depends_on:
      - postgres_db
      - mlflow
    volumes:
      - .:/app
      - mlflow_artifacts:/mlflow/artifacts
    environment:
      - DB_HOST=postgres_db
      - DB_USER=admin
      - DB_PASSWORD=password123
      - DB_NAME=satisfaction_client
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command: python app/main.py

  celery_worker:
    build: .
    container_name: satisfaction_celery_worker
    depends_on:
      - postgres_db
      - mlflow
      - redis
    volumes:
      - .:/app
      - mlflow_artifacts:/mlflow/artifacts
    environment:
      - DB_HOST=postgres_db
      - DB_USER=admin
      - DB_PASSWORD=password123
      - DB_NAME=satisfaction_client
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    command: celery -A app.api.celery_app.celery_app worker --loglevel=info --concurrency=1

  api:
    build: .
    container_name: satisfaction_api
    depends_on:
      - postgres_db
      - mlflow
      - redis
    volumes:
      - .:/app
      - mlflow_artifacts:/mlflow/artifacts
    environment:
      - DB_HOST=postgres_db
      - DB_USER=admin
      - DB_PASSWORD=password123
      - DB_NAME=satisfaction_client
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - API_KEY=dev-satisfaction-key
      - JWT_SECRET_KEY=dev-satisfaction-jwt-secret-change-me-32-bytes
      - JWT_EXPIRE_MINUTES=1440
      - DEMO_ORG_NAME=Demo Satisfaction Client
      - DEMO_ADMIN_EMAIL=demo@satisfaction.local
      - DEMO_ADMIN_PASSWORD=demo-password
      - DEMO_ADMIN_NAME=Admin Demo
      - PLATFORM_ADMIN_EMAIL=platform@satisfaction.local
      - PLATFORM_ADMIN_PASSWORD=platform-password
      - PLATFORM_ADMIN_NAME=Admin Plateforme
    ports:
      - "8000:8000"
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: satisfaction_frontend
    depends_on:
      - api
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

  dashboard:
    build: .
    container_name: satisfaction_dashboard
    depends_on:
      - postgres_db
      - mlflow
    volumes:
      - .:/app
    environment:
      - DB_HOST=postgres_db
      - DB_USER=admin
      - DB_PASSWORD=password123
      - DB_NAME=satisfaction_client
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    ports:
      - "8501:8501"
    command: streamlit run app/dashboard.py

volumes:
  postgres_data:
  mlflow_data:
  mlflow_artifacts:
  frontend_node_modules:
